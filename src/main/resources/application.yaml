spring:
  application:
    name: agent-demo

  datasource:
    url: jdbc:postgresql://localhost:5432/agent_demo
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:your-api-key-here}
      chat:
        options:
          model: gpt-4o-mini
      embedding:
        options:
          model: text-embedding-3-small

    vectorstore:
      pgvector:
        initialize-schema: true
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536   # text-embedding-3-small 维度

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
