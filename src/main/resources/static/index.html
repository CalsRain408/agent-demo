<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 知识库</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F0F2F5;
      --surface: #FFFFFF;
      --border: #E4E6EB;
      --primary: #4F6EF7;
      --primary-hover: #3A57E8;
      --danger: #FF4D4F;
      --text: #1A1A2E;
      --text-muted: #8A8FA8;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    header .logo {
      width: 30px; height: 30px;
      background: var(--primary);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    header .logo svg { color: #fff; }
    header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.3px; }

    /* ── Layout ── */
    .workspace {
      flex: 1;
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 0;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-section {
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-section h2 {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 12px;
    }

    /* Upload form */
    .form-group { margin-bottom: 10px; }
    .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 5px; }
    .form-group input[type="text"] {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-group input[type="text"]:focus { border-color: var(--primary); }

    .drop-zone {
      border: 1.5px dashed var(--border);
      border-radius: 8px;
      padding: 18px 12px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
      margin-bottom: 10px;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--primary);
      background: #F0F3FF;
    }
    .drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .drop-zone .dz-icon { font-size: 22px; margin-bottom: 4px; }
    .drop-zone .dz-text { font-size: 13px; color: var(--text-muted); }
    .drop-zone .dz-filename { font-size: 13px; font-weight: 500; color: var(--primary); margin-top: 4px; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 8px 16px;
      border: none; border-radius: 8px;
      font-size: 14px; font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn-primary { background: var(--primary); color: #fff; width: 100%; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .upload-status {
      font-size: 13px;
      margin-top: 8px;
      padding: 8px 10px;
      border-radius: 6px;
      display: none;
    }
    .upload-status.success { background: #F0FFF4; color: #27AE60; }
    .upload-status.error   { background: #FFF0F0; color: var(--danger); }

    /* Library list */
    .library-list { flex: 1; overflow-y: auto; padding: 12px; }
    .library-item {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.12s;
      user-select: none;
    }
    .library-item:hover { background: var(--bg); }
    .library-item.active { background: #EEF1FF; color: var(--primary); font-weight: 500; }
    .library-item .lib-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--primary); flex-shrink: 0;
    }
    .library-empty {
      padding: 20px 12px;
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
    }

    /* ── Chat panel ── */
    .chat-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    .chat-header {
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .chat-header .library-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: #EEF1FF;
      color: var(--primary);
      font-size: 13px; font-weight: 500;
      padding: 4px 10px;
      border-radius: 20px;
    }
    .chat-header .hint { font-size: 13px; color: var(--text-muted); }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 72%;
    }
    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.assistant { align-self: flex-start; align-items: flex-start; }

    .message .role {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 4px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .message .bubble {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.user .bubble {
      background: var(--primary);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .message.assistant .bubble {
      background: var(--surface);
      color: var(--text);
      border-bottom-left-radius: 4px;
      box-shadow: var(--shadow);
    }

    .message.assistant .bubble .cursor {
      display: inline-block;
      width: 2px; height: 14px;
      background: var(--primary);
      vertical-align: middle;
      margin-left: 2px;
      animation: blink 0.8s infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* Welcome state */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
    }
    .welcome .welcome-icon { font-size: 40px; }
    .welcome p { font-size: 14px; text-align: center; line-height: 1.6; }

    /* Library overview */
    .overview { padding: 24px; overflow-y: auto; }
    .overview-meta {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .overview-meta h3 { font-size: 14px; font-weight: 600; }
    .overview-meta span { font-size: 12px; color: var(--text-muted); }
    .doc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }
    .doc-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      cursor: default;
      transition: box-shadow 0.15s;
    }
    .doc-card:hover { box-shadow: var(--shadow); }
    .doc-card-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
    }
    .file-type-badge {
      background: #EEF1FF; color: var(--primary);
      font-size: 10px; font-weight: 700;
      padding: 2px 7px; border-radius: 4px;
      text-transform: uppercase; letter-spacing: 0.5px;
      flex-shrink: 0;
    }
    .doc-card .doc-name {
      font-size: 13px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .doc-card .doc-desc {
      font-size: 12px; color: var(--text-muted);
      line-height: 1.55;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .doc-card-footer {
      display: flex; gap: 12px;
      font-size: 11px; color: var(--text-muted);
    }

    /* Input area */
    .input-area {
      padding: 16px 24px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      transition: border-color 0.15s;
    }
    .input-row:focus-within { border-color: var(--primary); }

    .input-row textarea {
      flex: 1;
      border: none; outline: none; background: transparent;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
      color: var(--text);
    }
    .input-row textarea::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: var(--primary);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, opacity 0.15s;
    }
    .send-btn:hover { background: var(--primary-hover); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .send-btn svg { color: #fff; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
    </svg>
  </div>
  <h1>AI 知识库</h1>
</header>

<div class="workspace">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <h2>上传文档</h2>
      <div class="form-group">
        <label for="libraryName">知识库名称</label>
        <input type="text" id="libraryName" placeholder="例如：产品手册、技术文档…" />
      </div>
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.txt,.md,.pptx,.xlsx" />
        <div class="dz-icon">📄</div>
        <div class="dz-text">点击选择或拖拽文件</div>
        <div class="dz-text" style="font-size:11px;margin-top:2px">PDF · Word · TXT · Markdown</div>
        <div class="dz-filename" id="fileName"></div>
      </div>
      <button class="btn btn-primary" id="uploadBtn" disabled>上传到知识库</button>
      <div class="upload-status" id="uploadStatus"></div>
    </div>

    <div class="sidebar-section" style="border-bottom:none; padding-bottom:8px;">
      <h2>知识库列表</h2>
    </div>
    <div class="library-list" id="libraryList">
      <div class="library-empty">暂无知识库</div>
    </div>
  </aside>

  <!-- Chat -->
  <div class="chat-panel">
    <div class="chat-header" id="chatHeader">
      <span class="hint">← 从左侧选择知识库开始提问</span>
    </div>

    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">💬</div>
        <p>选择一个知识库，然后向 AI 提问<br/>AI 将基于文档内容为你作答</p>
      </div>
      <!-- 选中知识库后显示文档概览，开始对话后隐藏 -->
      <div class="overview" id="libraryOverview" style="display:none"></div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <textarea id="questionInput" rows="1" placeholder="输入问题，按 Enter 发送，Shift+Enter 换行…"></textarea>
        <button class="send-btn" id="sendBtn" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
  let selectedLibrary = null;
  let isStreaming = false;

  const libraryNameInput = document.getElementById('libraryName');
  const fileInput        = document.getElementById('fileInput');
  const dropZone         = document.getElementById('dropZone');
  const fileNameEl       = document.getElementById('fileName');
  const uploadBtn        = document.getElementById('uploadBtn');
  const uploadStatus     = document.getElementById('uploadStatus');
  const libraryListEl    = document.getElementById('libraryList');
  const chatHeader       = document.getElementById('chatHeader');
  const messagesEl       = document.getElementById('messages');
  const questionInput    = document.getElementById('questionInput');
  const sendBtn          = document.getElementById('sendBtn');
  const welcomeEl        = document.getElementById('welcome');
  const libraryOverview  = document.getElementById('libraryOverview');

  // ── File selection ──
  function onFileSelected(file) {
    if (!file) return;
    fileNameEl.textContent = file.name;
    checkUploadReady();
  }

  fileInput.addEventListener('change', () => onFileSelected(fileInput.files[0]));
  libraryNameInput.addEventListener('input', checkUploadReady);

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) { fileNameEl.textContent = file.name; checkUploadReady(); }
    // Assign to fileInput for upload
    const dt = new DataTransfer();
    dt.items.add(file);
    fileInput.files = dt.files;
  });

  function checkUploadReady() {
    uploadBtn.disabled = !(libraryNameInput.value.trim() && fileInput.files.length > 0);
  }

  // ── Upload ──
  uploadBtn.addEventListener('click', async () => {
    const name = libraryNameInput.value.trim();
    const file = fileInput.files[0];
    if (!name || !file) return;

    uploadBtn.disabled = true;
    uploadBtn.textContent = '上传中…';
    showStatus('', '');

    const formData = new FormData();
    formData.append('libraryName', name);
    formData.append('file', file);

    try {
      const res = await fetch('/api/knowledge/upload', { method: 'POST', body: formData });
      const data = await res.json();
      if (res.ok) {
        showStatus(data.message, 'success');
        fileInput.value = '';
        fileNameEl.textContent = '';
        libraryNameInput.value = '';
        uploadBtn.disabled = true;
        await loadLibraries();
      } else {
        showStatus(data.error || '上传失败', 'error');
      }
    } catch (e) {
      showStatus('网络错误：' + e.message, 'error');
    } finally {
      uploadBtn.textContent = '上传到知识库';
      checkUploadReady();
    }
  });

  function showStatus(msg, type) {
    uploadStatus.textContent = msg;
    uploadStatus.className = 'upload-status' + (type ? ' ' + type : '');
    uploadStatus.style.display = msg ? 'block' : 'none';
  }

  // ── Library list ──
  async function loadLibraries() {
    try {
      const res = await fetch('/api/knowledge/libraries');
      const libs = await res.json();
      renderLibraries(libs);
    } catch (e) {
      console.error('Failed to load libraries', e);
    }
  }

  function renderLibraries(libs) {
    if (!libs.length) {
      libraryListEl.innerHTML = '<div class="library-empty">暂无知识库</div>';
      return;
    }
    libraryListEl.innerHTML = libs.map(lib => `
      <div class="library-item ${lib === selectedLibrary ? 'active' : ''}" data-lib="${escapeHtml(lib)}">
        <span class="lib-dot"></span>${escapeHtml(lib)}
      </div>
    `).join('');
    libraryListEl.querySelectorAll('.library-item').forEach(el => {
      el.addEventListener('click', () => selectLibrary(el.dataset.lib));
    });
  }

  function selectLibrary(name) {
    selectedLibrary = name;
    document.querySelectorAll('.library-item').forEach(el => {
      el.classList.toggle('active', el.dataset.lib === name);
    });
    chatHeader.innerHTML = `
      <span class="library-badge">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        ${escapeHtml(name)}
      </span>
      <span class="hint">基于知识库内容回答</span>`;
    sendBtn.disabled = false;
    questionInput.placeholder = '向「' + name + '」提问…';

    // 隐藏欢迎页，展示文档概览
    if (welcomeEl) welcomeEl.style.display = 'none';
    libraryOverview.style.display = 'block';
    loadLibraryOverview(name);
  }

  async function loadLibraryOverview(libraryName) {
    libraryOverview.innerHTML = '<div style="padding:24px;color:var(--text-muted);font-size:13px">加载中…</div>';
    try {
      const res = await fetch('/api/knowledge/documents?libraryName=' + encodeURIComponent(libraryName));
      const docs = await res.json();
      renderOverview(libraryName, docs);
    } catch (e) {
      libraryOverview.innerHTML = '<div style="padding:24px;color:var(--danger);font-size:13px">加载失败</div>';
    }
  }

  function renderOverview(libraryName, docs) {
    if (!docs.length) {
      libraryOverview.innerHTML = `<div style="padding:24px;color:var(--text-muted);font-size:13px">该知识库暂无文档</div>`;
      return;
    }
    const cards = docs.map(doc => {
      const date  = new Date(doc.uploadTime).toLocaleDateString('zh-CN');
      const size  = formatSize(doc.fileSize);
      const desc  = doc.description || '暂无描述';
      return `
        <div class="doc-card">
          <div class="doc-card-header">
            <span class="file-type-badge">${escapeHtml(doc.fileType || 'FILE')}</span>
            <span class="doc-name" title="${escapeHtml(doc.filename)}">${escapeHtml(doc.filename)}</span>
          </div>
          <div class="doc-desc">${escapeHtml(desc)}</div>
          <div class="doc-card-footer">
            <span>📅 ${date}</span>
            <span>💾 ${size}</span>
            <span>🧩 ${doc.chunkCount ?? 0} 块</span>
          </div>
        </div>`;
    }).join('');
    libraryOverview.innerHTML = `
      <div class="overview-meta">
        <h3>「${escapeHtml(libraryName)}」共 ${docs.length} 个文档</h3>
        <span>点击下方输入框开始提问</span>
      </div>
      <div class="doc-grid">${cards}</div>`;
  }

  function formatSize(bytes) {
    if (!bytes) return '—';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  // ── Chat ──
  questionInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) sendMessage();
    }
  });
  sendBtn.addEventListener('click', sendMessage);

  // Auto-resize textarea
  questionInput.addEventListener('input', () => {
    questionInput.style.height = 'auto';
    questionInput.style.height = Math.min(questionInput.scrollHeight, 120) + 'px';
  });

  async function sendMessage() {
    const question = questionInput.value.trim();
    if (!question || !selectedLibrary || isStreaming) return;

    isStreaming = true;
    sendBtn.disabled = true;
    questionInput.value = '';
    questionInput.style.height = 'auto';

    // 第一次发送时，用聊天视图替换 overview
    if (libraryOverview.style.display !== 'none') {
      libraryOverview.style.display = 'none';
    }

    appendMessage('user', question);
    const assistantBubble = appendMessage('assistant', '');
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    assistantBubble.appendChild(cursor);
    scrollToBottom();

    try {
      const res = await fetch('/api/knowledge/query/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ libraryName: selectedLibrary, question })
      });

      if (!res.ok) {
        assistantBubble.textContent = '请求失败，请稍后重试。';
        return;
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let content = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        content += decoder.decode(value, { stream: true });
        assistantBubble.textContent = content;
        assistantBubble.appendChild(cursor);
        scrollToBottom();
      }
      cursor.remove();
    } catch (e) {
      assistantBubble.textContent = '网络错误：' + e.message;
    } finally {
      isStreaming = false;
      sendBtn.disabled = !selectedLibrary;
    }
  }

  function appendMessage(role, text) {
    const wrapper = document.createElement('div');
    wrapper.className = 'message ' + role;

    const roleLabel = document.createElement('div');
    roleLabel.className = 'role';
    roleLabel.textContent = role === 'user' ? 'You' : 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    wrapper.appendChild(roleLabel);
    wrapper.appendChild(bubble);
    messagesEl.appendChild(wrapper);
    scrollToBottom();
    return bubble;
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Init
  loadLibraries();
</script>
</body>
</html>
